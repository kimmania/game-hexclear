<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Hex Clear" />
    <meta name="theme-color" content="#1a2332" />
    <meta
      name="description"
      content="Slide colorful hex tiles off the board in the right order."
    />
    <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
    <title>Hex Clear</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles/main.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <div>
          <h1 class="title">Hex Clear</h1>
          <button type="button" id="level-meta" class="level-meta level-meta-btn">
            Level 1
          </button>
        </div>
        <div class="header-actions">
          <button
            type="button"
            id="settings-btn"
            class="btn btn-icon"
            aria-label="Settings"
          >
            ⚙
          </button>
          <span id="status-chip" class="status-chip" data-variant="playing">Playing</span>
        </div>
      </header>

      <p id="continue-banner" class="continue-banner hidden" role="status"></p>
      <p id="level-title" class="level-title">Loading…</p>
      <p id="move-counter" class="move-counter" aria-live="polite"></p>
      <p id="hint" class="hint" aria-live="polite">
        Tap a hex to slide. Arrows move focus, Enter slides, H for hint.
      </p>

      <main class="game-area">
        <div id="board-host" class="board-host"></div>
      </main>

      <div id="win-panel" class="win-panel hidden" role="status" aria-live="polite">
        <p id="win-banner" class="win-banner">Level cleared!</p>
        <button type="button" id="replay-par" class="btn btn-primary hidden">
          Replay for par
        </button>
      </div>

      <div class="assist-controls" aria-label="Assist controls">
        <button type="button" id="hint-btn" class="btn">Hint</button>
        <button type="button" id="undo-btn" class="btn hidden">Undo</button>
      </div>

      <footer class="controls" aria-label="Game controls">
        <button type="button" id="prev-level" class="btn" disabled>Prev</button>
        <button type="button" id="levels-btn" class="btn">Levels</button>
        <button type="button" id="restart" class="btn btn-primary">Restart</button>
        <button type="button" id="next-level" class="btn" disabled>Next</button>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
